databaseChangeLog:
  - changeSet:
      id: 002-create-product-images-table
      author: kiro
      changes:
        - createTable:
            tableName: product_images
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_product_images_product
                    references: products(id)
                    deleteCascade: true
              - column:
                  name: url
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: display_order
                  type: INTEGER
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_product_images_product_id
            tableName: product_images
            columns:
              - column:
                  name: product_id
