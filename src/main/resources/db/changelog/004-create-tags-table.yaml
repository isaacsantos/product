databaseChangeLog:
  - changeSet:
      id: 004-create-tags-table
      author: kiro
      changes:
        - createTable:
            tableName: tags
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
